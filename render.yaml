# Render.com Blueprint — WAT 소개·설명서 정적 사이트
# 빌드 과정 없음(순수 HTML/CSS). 그대로 정적 호스팅.
services:
  - type: web
    name: wat-site
    runtime: static
    # 이 폴더(WAT_SITE) 안의 파일을 그대로 게시
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      # 잘못된 경로는 홈으로
      - type: rewrite
        source: /*
        destination: /index.html
