# Render.com Blueprint — WAT 소개·설명서 정적 사이트
# 빌드 과정 없음(순수 HTML/CSS). 저장소 루트를 그대로 정적 호스팅.
services:
  - type: web
    name: wat-site
    runtime: static
    # 저장소 루트(index.html이 있는 곳)를 게시
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    # 멀티페이지 정적 사이트: rewrite 없음.
    # Render가 파일을 그대로 서빙하고 "/"는 index.html을 자동 제공.
